codecov:
  require_ci_to_pass: false

ignore:
  - "api/v1alpha1/zz_generated.deepcopy.go"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

comment:
  layout: "reach,diff,flags,files,footer"
  require_changes: true
